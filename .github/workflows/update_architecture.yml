name: Render Mermaid Architecture

on:
  push:
    branches:
      - main
    paths:
      - 'README.md'
      - '.github/workflows/update_architecture.yml'

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Mermaid CLI
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render Mermaid to PNG
        run: |
          echo '{"args": ["--no-sandbox"]}' > puppeteer-config.json
          mmdc -p puppeteer-config.json -i README.md -o docs/assets/architecture_diagram.png

      - name: Commit and Push Updated Architecture Image
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/assets/architecture_diagram.png
          git diff --cached --quiet || (git commit -m "docs: auto-generate architecture diagram from mermaid" && git push)
